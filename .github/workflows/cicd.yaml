name: React App CICD

on:
  push:
    branches:
      - main
      - dev

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.0 

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm i

      - name: Compile project
        run: npm run build

      - name: Upload the built file
        uses: actions/upload-artifact@v6.0.0
        with:
           name: react build
           path: ./dist

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm i

      - name: Download the build file
        uses: actions/download-artifact@v7.0.0
        with:
          name: react build
          path: dist

      - name: Check for build file existence
        run: |
          (test -f dist/index.html && echo "Build file exists") || (echo "Build file doesn't exist && exit 1")

      - name: Run tests
        run: npm test -- --watchAll=false

  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.0
  
      - name: Download the build file
        uses: actions/download-artifact@v7.0.0
        with:
          name: react build
          path: dist

      - name: Verify dist files before deploy
        run: ls -la dist

      - name: deploy to azure static web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{}}
          repo_token: ${{}}
          action: upload
          app_location: "dist"
          output_location: ""
          skip_app_build: true


